services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: deepresearch
      POSTGRES_DB: deepresearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 60s

  agent:
    build: ./agent
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  gateway:
    build: ./java-gateway
    ports:
      - "8080:8080"
    environment:
      - AGENT_URL=http://agent:8000
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/deepresearch
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
      - agent

volumes:
  pgdata:
