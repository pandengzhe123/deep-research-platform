<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Deep Research</title>
    <style>
        :root { color-scheme: light; }
        body { font-family: system-ui; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #fff; color: #333; }
        h1 { font-size: 1.5rem; color: #111; }
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; background: #f8f9fa; color: #333; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        textarea:focus, input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        button { padding: 12px 32px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #5558e6; }
        button:disabled { background: #c7c9d1; cursor: not-allowed; }
        select { padding: 10px; background: #f8f9fa; color: #333; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        #progress { margin: 20px 0; padding: 16px; background: #f3f4f6; border-radius: 8px; min-height: 60px; font-family: monospace; font-size: 13px; white-space: pre-wrap; line-height: 1.6; color: #4b5563; }
        #report { margin: 20px 0; padding: 30px 40px; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; line-height: 1.8; display: none; }
        #report h1 { font-size: 1.6rem; border-bottom: 2px solid #6366f1; padding-bottom: 12px; color: #111; }
        #report h2 { font-size: 1.2rem; margin-top: 28px; color: #4338ca; }
        #report h3 { color: #374151; }
        #report code { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #be185d; }
        #report a { color: #4f46e5; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-warn { background: #fef3c7; color: #92400e; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <h1>Deep Research</h1>

    <!-- 登录区域 -->
    <div id="authArea" style="margin-bottom:16px; padding:12px; background:#f3f4f6; border-radius:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:14px">
        <input id="authUser" placeholder="用户名" style="width:120px; padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px">
        <input id="authPass" type="password" placeholder="密码" style="width:120px; padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px">
        <button onclick="doRegister()" style="padding:6px 14px; font-size:13px; background:#6366f1">注册</button>
        <button onclick="doLogin()" style="padding:6px 14px; font-size:13px; background:#059669">登录</button>
        <span id="authStatus" style="font-size:13px; color:#6b7280"></span>
    </div>

    <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap">
        <input type="file" id="fileInput" accept=".txt,.md,.pdf" style="padding:6px; font-size:13px; border:1px solid #d1d5db; border-radius:6px; background:#f8f9fa; color:#333">
        <button onclick="uploadFile()" style="padding:8px 16px; font-size:13px; background:#059669">上传到知识库</button>
        <span id="uploadStatus" style="font-size:13px; color:#6b7280"></span>
        <span id="fileList" style="font-size:12px; color:#6b7280"></span>
    </div>

    <textarea id="question" placeholder="例如：2025年AI领域最重要的三件事是什么？"></textarea>

    <div style="display:flex; align-items:center; gap:12px">
        <select id="level" style="padding:10px; background:#1a1a2e; color:#eee; border:1px solid #333; border-radius:8px">
            <option value="1">Level 1 — 极速搜索</option>
            <option value="2" selected>Level 2 — 搜索+反思</option>
            <option value="3">Level 3 — 多路并行</option>
            <option value="4">Level 4 — Supervisor调度</option>
        </select>
        <label style="display:flex;align-items:center;gap:4px;font-size:14px;cursor:pointer;color:#333">
            <input type="checkbox" id="ragToggle"> RAG
        </label>
        <button id="btn" onclick="start()">开始研究</button>
        <span id="status"></span>
    </div>

    <div id="sessions" style="margin:16px 0; font-size:13px; color:#6b7280"></div>

    <div id="progress"><em>等待提交...</em></div>
    <div id="report"></div>

    <script>
        let contextHistory = '';
        let authToken = localStorage.getItem('token') || '';

        // ========== 认证 ==========

        function updateAuthUI() {
            if (authToken) {
                document.getElementById('authUser').style.display = 'none';
                document.getElementById('authPass').style.display = 'none';
                document.querySelectorAll('#authArea button').forEach(b => b.style.display = 'none');
                // 显示用户名 + 退出按钮
                const username = localStorage.getItem('username') || '';
                document.getElementById('authStatus').innerHTML =
                    username + ' | <a href="#" onclick="logout()" style="color:#dc2626">退出</a>';
            }
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            document.getElementById('authUser').style.display = '';
            document.getElementById('authPass').style.display = '';
            document.querySelectorAll('#authArea button').forEach(b => b.style.display = '');
            document.getElementById('authStatus').textContent = '';
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('sessions').innerHTML = '';
        }

        async function doRegister() {
            const username = document.getElementById('authUser').value.trim();
            const password = document.getElementById('authPass').value.trim();
            if (!username || !password) return;
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await resp.json();
                if (data.token) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('username', data.username);
                    updateAuthUI();
                    loadFileList();
                    loadSessions();
                } else {
                    document.getElementById('authStatus').textContent = '❌ ' + data.message;
                }
            } catch (e) {
                document.getElementById('authStatus').textContent = '❌ ' + e.message;
            }
        }

        async function doLogin() {
            const username = document.getElementById('authUser').value.trim();
            const password = document.getElementById('authPass').value.trim();
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await resp.json();
                if (data.token) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('username', data.username);
                    updateAuthUI();
                    loadFileList();
                    loadSessions();
                } else {
                    document.getElementById('authStatus').textContent = '❌ ' + data.message;
                }
            } catch (e) {
                document.getElementById('authStatus').textContent = '❌ ' + e.message;
            }
        }

        function kbUserId() {
            return localStorage.getItem('username') || 'default';
        }

        function authHeaders() {
            const headers = {'Content-Type': 'application/json'};
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
            return headers;
        }

        // ========== 知识库 ==========

        async function loadFileList() {
            try {
                const resp = await fetch('http://localhost:8000/kb/files?user_id=' + kbUserId());
                const data = await resp.json();
                const files = data.files || [];
                const el = document.getElementById('fileList');
                if (files.length === 0) {
                    el.innerHTML = '（知识库为空）';
                } else {
                    el.innerHTML = '📁 ' + files.map(f =>
                        `${f.doc_id} <a href="#" onclick="deleteDoc('${f.doc_id}')" style="color:#dc2626;font-size:11px">[删]</a>`
                    ).join(' · ');
                }
            } catch (e) {}
        }

        async function deleteDoc(docId) {
            if (!confirm('确定删除 ' + docId + '？')) return;
            try {
                await fetch('http://localhost:8000/kb/files/' + docId + '?user_id=' + kbUserId(), { method: 'DELETE' });
                loadFileList();
            } catch (e) {}
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('uploadStatus');
            const file = fileInput.files[0];
            if (!file) { status.textContent = '请先选择文件'; return; }

            status.textContent = '上传中...';
            const form = new FormData();
            form.append('file', file);

            try {
                const uid = localStorage.getItem('username') || 'default';
                const resp = await fetch('http://localhost:8000/kb/upload?user_id=' + uid, {
                    method: 'POST', body: form
                });
                const data = await resp.json();
                if (data.status === 'ok') {
                    status.textContent = `✅ ${data.doc_id}`;
                    fileInput.value = '';
                    loadFileList();  // 刷新列表
                } else {
                    status.textContent = '❌ ' + (data.message || '失败');
                }
            } catch (e) {
                status.textContent = '❌ ' + e.message;
            }
        }

        async function loadSessions() {
            const el = document.getElementById('sessions');
            try {
                const resp = await fetch('/api/sessions', { headers: authHeaders() });
                if (!resp.ok) { el.innerHTML = ''; return; }
                const list = await resp.json();
                if (!list.length) { el.innerHTML = ''; return; }
                el.innerHTML = '📋 ' + list.map(s => {
                    const title = (s.question || s.id).substring(0, 15);
                    return `<a href="#" onclick="continueSession('${s.id}','${escapeHtml(s.question||'')}')" style="color:#6366f1" title="${escapeHtml(s.question||'')}">${escapeHtml(title)}</a>`;
                }).join(' · ');
            } catch (e) { el.innerHTML = ''; }
        }

        function escapeHtml(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,"&quot;"); }

        function continueSession(sid, question) {
            document.getElementById('question').value = '继续之前的话题: ' + question;
            contextHistory = sessionStorage.getItem('ctx_' + sid) || '';
            // 后续提交时会带上这个 session 的 context
        }

        // 页面加载时
        updateAuthUI();
        loadFileList();
        loadSessions();

        function start() {
            const question = document.getElementById('question').value.trim();
            if (!question) return alert('请输入问题');

            const level = parseInt(document.getElementById('level').value);
            const kbEnabled = document.getElementById('ragToggle').checked;
            const btn = document.getElementById('btn');
            const progress = document.getElementById('progress');
            const reportDiv = document.getElementById('report');
            const statusEl = document.getElementById('status');

            btn.disabled = true;
            progress.textContent = '';
            reportDiv.style.display = 'none';
            reportDiv.innerHTML = '';

            // 计时器 —— 让用户知道没卡死
            const startTime = Date.now();
            let timerId = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const min = Math.floor(elapsed / 60);
                const sec = elapsed % 60;
                statusEl.innerHTML = '<span style="color:#6366f1;font-weight:600">⏳ 运行中 ' + min + '分' + (sec < 10 ? '0' : '') + sec + '秒</span>';
            }, 1000);

            // 同步模式 —— 稳定可靠
            fetch('/api/research', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ question, level, context: contextHistory, kb_enabled: kbEnabled })
            }).then(res => {
                clearInterval(timerId);
                if (!res.ok) throw new Error('服务器返回 ' + res.status);
                return res.json();
            }).then(data => {
                if (data.need_clarify) {
                    contextHistory += (contextHistory ? '\n\n' : '') + '用户: ' + question;
                    progress.textContent = '❓ ' + (data.question || '需要补充信息') + '\n\n请在输入框补充后重新提交\n';
                    statusEl.innerHTML = '<span class="badge badge-warn">需要补充</span>';
                    btn.disabled = false;
                    return;
                }
                contextHistory = '';
                progress.textContent = '✅ 研究完成\n';
                statusEl.innerHTML = '<span class="badge badge-ok">完成</span>';
                if (data.report) {
                    reportDiv.innerHTML = data.report
                        .replace(/### /g, '<h3>').replace(/## /g, '<h2>').replace(/# /g, '<h1>')
                        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                        .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
                        .replace(/\n- /g, '\n• ');
                    reportDiv.style.display = 'block';
                }
            }).catch(err => {
                clearInterval(timerId);
                if (err.message.includes('401') || err.message.includes('403')) {
                    progress.textContent = '🔒 请先登录/注册后再提问\n';
                } else {
                    progress.textContent = '❌ 请求失败: ' + err.message + '\n';
                }
                statusEl.innerHTML = '<span class="badge badge-warn">失败</span>';
                contextHistory = '';
            }).finally(() => { btn.disabled = false; });
        }
    </script>
</body>
</html>
