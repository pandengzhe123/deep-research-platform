server:
  port: 8080

# Python Agent 地址
agent:
  url: ${AGENT_URL:http://localhost:8000}

logging:
  level:
    com.deepresearch: DEBUG

spring:
  threads:
    virtual:
      enabled: true   # Java 21 虚拟线程
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/deepresearch}
    username: postgres
    password: deepresearch
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000      # 等 PG 就绪，最多 10s
      validation-timeout: 3000
      maximum-pool-size: 10
      auto-commit: true
      connection-test-query: SELECT 1  # 每次借连接前验证
  jpa:
    hibernate:
      ddl-auto: none  # 用 schema.sql 建表，不用 Hibernate 自动建
    show-sql: false
  sql:
    init:
      mode: always    # 启动时执行 schema.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
