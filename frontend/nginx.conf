server {
    listen 80;

    # Vue 静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # API → Java 网关
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # KB → Python Agent
    location /kb/ {
        proxy_pass http://agent:8000;
    }

    # SSE → Python Agent
    location /research/ {
        proxy_pass http://agent:8000;
        proxy_read_timeout 600s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
}
